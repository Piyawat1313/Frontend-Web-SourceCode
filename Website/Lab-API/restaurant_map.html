<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่ร้านอาหารรอบมหาวิทยาลัยศิลปากร</title>
    <style>
        /* จัดรูปแบบพื้นฐาน */
        body {
            font-family: 'Sarabun', sans-serif; /* แนะนำให้ใช้ฟอนต์ไทยสวยๆ */
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        /* คอนเทนเนอร์สำหรับแผนที่ */
        #map-container {
            height: 600px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* ตัวแผนที่ Google Map */
        #map {
            height: 100%;
            width: 100%;
        }

        /* จัดรูปแบบ Info Window (กล่องข้อมูลที่เด้งขึ้นมา) */
        .gm-style .gm-style-iw {
            padding: 10px;
            max-width: 300px !important;
        }
        
        .info-window-content h3 {
            margin-top: 0;
            color: #27ae60;
            font-size: 1.2rem;
        }

        .info-window-content p {
            margin: 8px 0;
            color: #555;
            line-height: 1.4;
        }

        .standard-badge {
            display: inline-block;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-right: 5px;
            margin-bottom: 5px;
            border: 1px solid #a5d6a7;
        }

        .shop-link-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .shop-link-btn:hover {
            background-color: #2980b9;
        }
    </style>
    <!-- (ทางเลือก) ใส่ Google Font เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <h1>แผนที่ร้านอาหารรอบมหาวิทยาลัยศิลปากร</h1>
    
    <div id="map-container">
        <div id="map"></div>
    </div>


    <script>
        // --- ส่วนที่ 1: ข้อมูลจำลองร้าน (ในระบบจริง ข้อมูลนี้ควรมาจากฐานข้อมูล/API) ---
        const foodShopsData = [
            {
                id: 0,
                name: "Daisachi Shabu",
                lat: 13.81501, 
                lng: 100.04348,
                location: "ถนนทรงพล อ.เมืองนครปฐม จ.นครปฐม",
                food: ["ชาบู", "บุพเฟ่"],
                description: "ไปเป็นแก๊ง อร่อย จ่ายเท่ากัน",
                link: "https://www.facebook.com/daisachishabu/?locale=th_TH" // ใส่ลิงก์จริงที่นี่
            },
            {
                id: 1,
                name: "ใบเมี่ยง",
                lat: 13.81482, 
                lng: 100.04334,
                location: "ถนนทรงพล อ.เมืองนครปฐม จ.นครปฐม",
                food: ["หมูห่อใบยอ", "แหนมเนือง", "ก๋วยเตี๋ยวญวน"],
                description: "ร้านอาหารสำหรับคนลดน้ำหนัก",
                link: "https://www.facebook.com/BaimiangMore/" // ใส่ลิงก์จริงที่นี่
            },
            
            // เพิ่มข้อมูลร้านค้าอื่นๆ ต่อที่นี่...
             {
                id: 2,
                name: "ร้านก๋วยเตี๋ยวโบราณ",
                lat: 13.74582,
                lng: 100.08434,
                location: "ดอยยายหอม อ.เมืองนครปฐม จ.นครปฐม",
                food: ["ก๋วยเตี๋ยวหมู", "เกาเหลาหมูต้มยำ"],
                description: "ราคาสบายกระเป๋า",
                link: "http://www.noodle.com/example"
            }
        ];


        let map;
        let activeInfoWindow; // ตัวแปรเก็บ InfoWindow ที่เปิดอยู่ปัจจุบัน

        // --- ส่วนที่ 2: ฟังก์ชันเริ่มต้นแผนที่ ---
        function initMap() {
            // 2.1 ตั้งค่าจุดศูนย์กลางและซูมเริ่มต้น (ตั้งไว้ที่กึ่งกลางประเทศไทย)
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 13.736717, lng: 100.523186 },
                zoom: 6, // ระดับการซูมให้เห็นทั่วประเทศ
                mapTypeControl: false, // ซ่อนปุ่มเปลี่ยนประเภทแผนที่ (ถ้าต้องการ)
                streetViewControl: false // ซ่อนปุ่ม Street View
            });

            // 2.2 วนลูปข้อมูลและสร้างหมุด (Marker)
            foodShopsData.forEach((shop) => {
                createMarker(shop);
            });
        }

        // --- ส่วนที่ 3: ฟังก์ชันสร้างหมุดและหน้าต่างข้อมูล ---
        function createMarker(shop) {
            const marker = new google.maps.Marker({
                position: { lat: shop.lat, lng: shop.lng },
                map: map,
                title: shop.name,
                animation: google.maps.Animation.DROP // เพิ่มอนิเมชั่นตอนหมุดหล่นลงมา
                // icon: 'path/to/custom-icon.png' // (ทางเลือก) ถ้ามีไอคอนรูปเอง
            });

            // สร้าง HTML สำหรับแสดงมาตรฐานแบบป้าย (Badge)
            let standardsHTML = '';
            if (shop.food && shop.food.length > 0) {
                standardsHTML = shop.food.map(std => `<span class="standard-badge">${std}</span>`).join('');
            } else {
                standardsHTML = '<span style="color:#999;">- ไม่ระบุ -</span>';
            }

            // สร้างเนื้อหา HTML ภายใน Info Window
            const contentString = `
                <div class="info-window-content">
                    <h3>${shop.name}</h3>
                    <p><strong>📍 พื้นที่:</strong> ${shop.location}</p>
                    <p><strong>📜 คำอธิบาย:</strong> ${shop.description}</p>
                    <p><strong>✅ อาหารแนะนำ:</strong><br>${standardsHTML}</p>
                    <a href="${shop.link}" target="_blank" class="shop-link-btn">
                        ไปที่ร้านค้า / โซเชียล 🛒
                    </a>
                </div>
            `;

            const infowindow = new google.maps.InfoWindow({
                content: contentString,
            });

            // เพิ่ม Event Listener เมื่อคลิกที่หมุด
            marker.addListener("click", () => {
                // ปิด InfoWindow อันเก่าที่เปิดอยู่ก่อน (ถ้ามี)
                if (activeInfoWindow) {
                    activeInfoWindow.close();
                }
                // เปิด InfoWindow อันใหม่
                infowindow.open({
                    anchor: marker,
                    map,
                    shouldFocus: false,
                });
                // อัปเดตให้เป็น Active
                activeInfoWindow = infowindow;
            });
        }
    </script>

    <!-- 
      ⚠️ สำคัญมาก: แทนที่ YOUR_API_KEY ด้วย API Key ของคุณเอง ⚠️ 
      และตรวจสอบให้แน่ใจว่าได้เปิดใช้งาน Maps JavaScript API ใน Google Cloud Console แล้ว
	  ถ้าใครไม่มีใช้ API Key "AIzaSyBxI98oqDImMmSw0DiLztbFk6vovXy8BpM"
    -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCN99mWKKvvFskGodzFS3-41k-PRRyusBg&callback=initMap">
    </script>

</body>
</html>
