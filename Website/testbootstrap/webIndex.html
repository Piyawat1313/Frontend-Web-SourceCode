<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- div มันคือการจัดกลุ่ม เรียกใช้class ในbootstarp แบ่งส่วนต่างๆในการแสดงผลป_ -->
    <div class="container">
        <h1 class="display-3 bg-warning border border-5 border-success mt-4 p-3">ปิยวัฒน์  เดียนประไพ</h1>
        <p class="h3 text-dark bg-info px-4">ภาควิชาคอมพิวเตอร์</p>
        <p class="h5 text-success">สาขาวิทยาการคอมพิวเตอร์ ปี2</p>
        <div class="row">
            <div class="col-sm-3 bg-warning">
                <img src="football.jpg" class="rounded img-fulid" alt="football" >
                <h3>football</h3>
            </div>
            
            <div class="col-sm-3 bg-secondary"> <img src="futsal1.jpg"  class="rounded-circle img-fulid" alt="futsal">
                <h3>futsal</h3>
            </div>
           
            <div class="col-sm-3 bg-info">แบตมินตัน</div>
            <div class="col-sm-3 bg-primary">ตะกร้อ</div>
        </div>
    </div>
    
     
</body>
</html>
