<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap");
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      body {
        background-color: hsl(47, 88%, 63%);
        font-family: "Figtree", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .card {
        background-color: hsl(0, 0%, 100%);
        max-width: 384px;
        border: 1px solid #000;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 8px 8px 0px #000;
      }
      .card > img {
        /*ขอบด้านขวา*/
        width: 100%;
        border-radius: 10px;
        display: block;
        margin-bottom: 24px;
      }
      .text {
        margin: 30px;
        padding: 30px;
      }
      #badge {
        background-color: hsl(47, 88%, 63%);
        display: inline-block;
        padding: 4px 12px;
        border-radius: 4px;
        font-weight: 800;
        font-size: 14px;
        margin-bottom: 12px;
      }
      #date {
        font-size: 14px;
        margin-bottom: 12px;
        font-weight: 500;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 12px;
        cursor: pointer;
      }
      /* เมื่อเอาเม้าไปชี้ต้องเปลี่ยนสี */
      h1:hover {
        color: hsl(47, 88%, 63%);
      }
      #description {
        color: hsl(0, 0%, 50%);
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .author {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      /* Profile */
      .author img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }
      /* Name */
      .author p {
        font-weight: 800;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="back">
      <div class="card">
        <img
          src="/assets/images/illustration-article.svg"
          alt="illustration-article"
        />
        <div class="text">
          <p id="badge">Learning</p>
          <p id="date">Published 21 Dec 2023</p>
          <h1>HTML & CSS foundations</h1>
          <p id="description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
          <div class="author">
            <img src="/assets/images/image-avatar.webp" alt="Avatar Profile" />
            <p>Greg Hooper</p>
          </div>
        </div>
      </div>
    </div>
    <br />
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
